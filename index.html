<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca de Documentações</title>
  <link rel="stylesheet" href="docs-viewer.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="logo">
        <img src="https://www.kovr.com.br/assets/icons/logo-mini.svg" alt="Kovr Logo" />
      </div>
      <h2>Kovr Seguradora</h2>
      <ul id="docs-list">
        <!-- Links gerados por JS -->
      </ul>
    </aside>
    <main class="content">
      <div id="doc-content" class="markdown-body">
        <p>Selecione uma documentação no menu ao lado.</p>
      </div>
    </main>
  </div>
  <script src="docs-viewer.js"></script>
</body>
</html>
